spring.datasource.url=jdbc:postgresql://localhost:5432/vetTriageDb
spring.datasource.username=postgres
spring.datasource.password=alicci
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.serialization.write-dates-as-timestamps=false

app.jwt.secret=VetTriageSecretKeyForJWTTokenGenerationMustBe256BitsLongOrMore
app.jwt.expiration-ms=28800000

server.port=8081

# Mail (Gmail SMTP) - set MAIL_USERNAME and MAIL_PASSWORD env vars
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.test-connection=false

# Frontend URL for redirect after email verification
app.frontend-url=${FRONTEND_URL:http://localhost:5174}

# CORS allowed origins (comma-separated); override with ALLOWED_ORIGINS env var in production
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# Set MAIL_ENABLED=true in production to send real emails
app.mail.enabled=${MAIL_ENABLED:false}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Firebase Cloud Messaging (FCM v1 HTTP API)
firebase.project-id=${FIREBASE_PROJECT_ID:vettriage}
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:firebase-service-account.json}
